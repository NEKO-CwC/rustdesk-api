name: Build Full S6 amd64

on:
  workflow_dispatch:
    inputs:
      IMAGE_TAG:
        description: "Tag for ghcr.io/neko-cwc/rustdesk-api"
        required: true
        default: "full-s6"
      RUSTDESK_SERVER_IMAGE:
        description: "Patched rustdesk-server-s6 image copied into the full-s6 image"
        required: true
        default: "ghcr.io/neko-cwc/rustdesk-server-s6:ipv6-candidate-forwarding"

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/neko-cwc/rustdesk-api
  IMAGE_TAG: ${{ github.event.inputs.IMAGE_TAG || 'full-s6' }}
  RUSTDESK_SERVER_IMAGE: ${{ github.event.inputs.RUSTDESK_SERVER_IMAGE || 'ghcr.io/neko-cwc/rustdesk-server-s6:ipv6-candidate-forwarding' }}

jobs:
  build-and-push:
    name: Build and push full-s6 linux/amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout web client
        uses: actions/checkout@v4
        with:
          repository: lejianwen/rustdesk-api-web
          path: rustdesk-api-web
          ref: master

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build web client
        working-directory: rustdesk-api-web
        run: |
          npm install
          npm run build
          mkdir -p ../resources/admin/
          cp -ar dist/* ../resources/admin/

      - name: Prepare Go dependencies and docs
        run: |
          go mod tidy
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/apimain.go --output docs/api --instanceName api --exclude http/controller/admin
          swag init -g cmd/apimain.go --output docs/admin --instanceName admin --exclude http/controller/api

      - name: Build linux/amd64 API binary
        run: |
          sudo apt-get update
          sudo apt-get install -y musl musl-dev musl-tools
          echo "${IMAGE_TAG}" > resources/version
          mkdir -p release release/data release/runtime
          cp -ar resources release/
          cp -ar docs release/
          cp -ar conf release/
          GOOS=linux GOARCH=amd64 CC=musl-gcc CGO_LDFLAGS="-static" CGO_ENABLED=1 go build -ldflags "-s -w" -o ./release/apimain ./cmd/apimain.go
          mkdir -p amd64
          mv release amd64/release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full-s6 image
        uses: docker/build-push-action@v5
        with:
          context: "."
          file: ./Dockerfile_full_s6
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            BUILDARCH=amd64
            RUSTDESK_SERVER_IMAGE=${{ env.RUSTDESK_SERVER_IMAGE }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:full-s6-amd64
